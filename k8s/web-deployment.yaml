# Deployment for the Next.js web app. The image tag below is a
# placeholder — deploy-poller (k8s/ci/) overwrites it with
# `kubectl set image` after each successful in-cluster kaniko build, and
# deploy/bootstrap.sh triggers the first build the same way. Do not edit
# the tag by hand; it is not meant to stay in sync with this file.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: transigen
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      imagePullSecrets:
        - name: ocir-cred
      containers:
        - name: web
          image: PLACEHOLDER_OCIR_IMAGE:PLACEHOLDER_TAG
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: web-runtime
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
