# Staging data-plane secret: LOCAL-ONLY dev values, safe to commit (staging
# runs on a developer's minikube, never on the public internet). The
# POSTGRES_PASSWORD and GELP_DB_PASSWORD values match gelp's committed staging
# secret so either repo's apply leaves the other app working.
# TRANSIGEN_DB_PASSWORD must match the password in the transigen-env
# DATABASE_URL in the staging app overlay.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: "gelp"
  GELP_DB_PASSWORD: "gelp"
  TRANSIGEN_DB_PASSWORD: "transigen"
