# Staging data plane: the same shared-Postgres design as prod, on minikube.
# The base here is a VERBATIM copy of gelp's deploy/k8s/data/base (same
# generated ConfigMap hash), so gelp and transigen can each apply it to the
# shared local cluster without fighting. PROVISION_APPS lists both apps so a
# fresh volume provisions both; on an already-initialised volume,
# deploy/stage.sh re-runs the provisioning script for transigen explicitly.
# The Secret holds local-only dev values and is committed (like the staging
# app secrets), safe because staging never faces the internet.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data

resources:
  - ../../base
  - postgres-secret.yaml

patches:
  - target:
      kind: StatefulSet
      name: postgres
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PROVISION_APPS
          value: "gelp transigen"
