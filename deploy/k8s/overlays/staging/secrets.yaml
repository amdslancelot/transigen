# Staging secrets. These are LOCAL-ONLY development values and are safe to
# commit: staging runs on a developer's minikube, never on the public internet.
# For real Google sign-in on staging, replace the two AUTH_GOOGLE_* placeholders
# with a real OAuth client and add
# http://transigen.staging.localhost/api/auth/callback/google as an authorized
# redirect URI in the Google Cloud console.
apiVersion: v1
kind: Secret
metadata:
  name: transigen-env
type: Opaque
stringData:
  # Points at the shared Postgres in the `data` namespace (cross-namespace DNS).
  # The transigen_rw password must match the TRANSIGEN_DB_PASSWORD that
  # deploy/stage.sh passes to deploy/provision-db.sh (staging convention:
  # the literal "transigen").
  DATABASE_URL: "postgres://transigen_rw:transigen@postgres.data.svc.cluster.local:5432/transigen"

  # Auth.js session/JWT signing secret (dev-only value).
  AUTH_SECRET: "staging-dev-secret-not-for-production"

  # Google OAuth client. Replace to exercise real sign-in on staging.
  AUTH_GOOGLE_ID: "replace-with-google-oauth-client-id"
  AUTH_GOOGLE_SECRET: "replace-with-google-oauth-client-secret"

  # Canonical URL Auth.js uses to build callback URLs on staging.
  AUTH_URL: "http://transigen.staging.localhost"
  AUTH_TRUST_HOST: "true"

  # Optional integrations; the app works without them.
  YOUTUBE_API_KEY: ""
  SPOTIFY_CLIENT_ID: ""
  SPOTIFY_CLIENT_SECRET: ""
