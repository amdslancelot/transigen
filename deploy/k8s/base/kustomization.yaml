# Namespace-agnostic base for Transigen. Overlays set the namespace, the image
# tag, the ingress host, secrets, and (in prod) TLS. Nothing here hardcodes a
# namespace or an environment-specific value.
#
# The database is NOT here: transigen connects to the shared Postgres in the
# `data` namespace (owned by the snoopy_home repo; see deploy/README.md). Its
# DATABASE_URL comes from the transigen-env Secret each overlay supplies.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - app-deployment.yaml
  - app-service.yaml
  - app-ingress.yaml
